<!DOCTYPE html>
<html>
<head>
    <title>测试概念API</title>
</head>
<body>
    <h1>测试概念API</h1>
    <button onclick="testConceptsAPI()">测试获取概念</button>
    <div id="result"></div>

    <script>
        async function testConceptsAPI() {
            try {
                console.log('🔄 测试概念API...');
                const response = await fetch('http://localhost:3001/api/v1/concepts/');
                console.log('📡 API响应状态:', response.status, response.statusText);

                if (response.ok) {
                    const result = await response.json();
                    console.log('📊 API返回数据:', result);
                    
                    if (result.success && result.data.concepts) {
                        const concepts = result.data.concepts.map((apiConcept) => ({
                            id: String(apiConcept.id),
                            name: apiConcept.name,
                            description: apiConcept.description || '',
                            stockCount: apiConcept.stock_count || 0,
                            isActive: apiConcept.is_active !== false
                        }));
                        
                        console.log(`✅ 处理后的概念数据 (${concepts.length}个):`, concepts);
                        
                        document.getElementById('result').innerHTML = `
                            <h2>成功获取 ${concepts.length} 个概念:</h2>
                            <ul>
                                ${concepts.map(c => `<li>${c.name} (${c.stockCount}只股票)</li>`).join('')}
                            </ul>
                        `;
                    } else {
                        console.warn('⚠️ API返回格式不正确');
                        document.getElementById('result').innerHTML = '<p style="color: red;">API返回格式不正确</p>';
                    }
                } else {
                    console.error('❌ API请求失败:', response.status);
                    document.getElementById('result').innerHTML = '<p style="color: red;">API请求失败</p>';
                }
            } catch (error) {
                console.error('❌ 测试失败:', error);
                document.getElementById('result').innerHTML = '<p style="color: red;">测试失败: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
