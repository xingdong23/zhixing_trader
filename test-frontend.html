<!DOCTYPE html>
<html>
<head>
    <title>测试前端数据加载</title>
</head>
<body>
    <h1>测试前端数据加载</h1>
    <button onclick="testStocksAPI()">测试股票API</button>
    <button onclick="testConceptsAPI()">测试概念API</button>
    <div id="result"></div>

    <script>
        async function testStocksAPI() {
            try {
                console.log('🔄 测试股票API...');
                const response = await fetch('http://localhost:3001/api/v1/stocks/');
                console.log('📡 股票API响应状态:', response.status, response.statusText);

                if (response.ok) {
                    const result = await response.json();
                    console.log('📊 股票API返回数据:', result);
                    
                    if (result.success && result.data.stocks) {
                        const apiStocks = result.data.stocks.map((apiStock) => ({
                            id: `api_${apiStock.id}`,
                            symbol: apiStock.symbol,
                            name: apiStock.name,
                            market: apiStock.market,
                            tags: {
                                industry: [apiStock.group_name || '未分类'],
                                fundamentals: [],
                                technical: []
                            },
                            conceptIds: [],
                            watchLevel: 'normal',
                            currentPrice: 0,
                            priceChange: 0,
                            priceChangePercent: 0,
                            volume: 0,
                            addedAt: new Date(apiStock.added_at),
                            updatedAt: new Date(apiStock.updated_at),
                            notes: '从数据库加载',
                            opinions: []
                        }));
                        
                        console.log(`✅ 转换后的股票数据 (${apiStocks.length}个):`, apiStocks);
                        
                        document.getElementById('result').innerHTML = `
                            <h2>股票API测试成功:</h2>
                            <p>获取到 ${apiStocks.length} 只股票</p>
                            <ul>
                                ${apiStocks.map(s => `<li>${s.symbol} - ${s.name} (${s.market})</li>`).join('')}
                            </ul>
                        `;
                    } else {
                        console.warn('⚠️ 股票API返回格式不正确');
                        document.getElementById('result').innerHTML = '<p style="color: red;">股票API返回格式不正确</p>';
                    }
                } else {
                    console.error('❌ 股票API请求失败:', response.status);
                    document.getElementById('result').innerHTML = '<p style="color: red;">股票API请求失败</p>';
                }
            } catch (error) {
                console.error('❌ 股票测试失败:', error);
                document.getElementById('result').innerHTML = '<p style="color: red;">股票测试失败: ' + error.message + '</p>';
            }
        }

        async function testConceptsAPI() {
            try {
                console.log('🔄 测试概念API...');
                const response = await fetch('http://localhost:3001/api/v1/concepts/');
                console.log('📡 概念API响应状态:', response.status, response.statusText);

                if (response.ok) {
                    const result = await response.json();
                    console.log('📊 概念API返回数据:', result);
                    
                    if (result.success && result.data.concepts) {
                        const concepts = result.data.concepts.map((apiConcept) => ({
                            id: String(apiConcept.id),
                            name: apiConcept.name,
                            description: apiConcept.description || '',
                            stockCount: apiConcept.stock_count || 0,
                            isActive: apiConcept.is_active !== false
                        }));
                        
                        console.log(`✅ 转换后的概念数据 (${concepts.length}个):`, concepts);
                        
                        document.getElementById('result').innerHTML = `
                            <h2>概念API测试成功:</h2>
                            <p>获取到 ${concepts.length} 个概念</p>
                            <ul>
                                ${concepts.map(c => `<li>${c.name} (${c.stockCount}只股票)</li>`).join('')}
                            </ul>
                        `;
                    } else {
                        console.warn('⚠️ 概念API返回格式不正确');
                        document.getElementById('result').innerHTML = '<p style="color: red;">概念API返回格式不正确</p>';
                    }
                } else {
                    console.error('❌ 概念API请求失败:', response.status);
                    document.getElementById('result').innerHTML = '<p style="color: red;">概念API请求失败</p>';
                }
            } catch (error) {
                console.error('❌ 概念测试失败:', error);
                document.getElementById('result').innerHTML = '<p style="color: red;">概念测试失败: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
